  </svg>
</a>
        <a href="#" class="menu-icon" title="Hồ sơ">

        <a href="#" class="menu-icon active" title="Nhân viên">

            <line x1="21" y1="12" x2="9" y2="12"/>

      <a href="#" class="menu-icon sidebar-settings" title="Cài đặt">

  </svg>
</a>

    </div>

    <div class="noi-dung">
      <div class="sub-sidebar">
        <div class="sub-sidebar-tieu-de">
          <a href="#" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="15,18 9,12 15,6"/>
            </svg>
          </a>
          <span>Quản lý nhân viên</span>
        </div>

        <nav class="sub-menu">
          <a href="#" class="sub-menu-item active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9z"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Tạo tài khoản
          </a>
          <a href="#" class="sub-menu-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <line x1="7" y1="8" x2="17" y2="8"/>
              <line x1="7" y1="12" x2="17" y2="12"/>
              <line x1="7" y1="16" x2="13" y2="16"/>
            </svg>
            Danh sách nhân viên
          </a>
        </nav>
      </div>
      <div class="vung-form">

        <h1 class="form-tieu-de">Tạo tài khoản</h1>
        <div class="thong-bao" id="thong-bao"></div>

        <div class="form-noi-dung">
          <div class="nhom-input">
            <label class="nhan" for="ho-ten">Họ và tên</label>
            <div class="khung-input" id="khung-ho-ten">
              <input
                type="text"
                id="ho-ten"
                class="o-nhap"
                placeholder="examplename"
              >
            </div>
            <div class="loi-text" id="loi-ho-ten"></div>
          </div>

          <div class="nhom-input">
            <label class="nhan" for="email">Email</label>
            <div class="khung-input" id="khung-email">
              <input
                type="email"
                id="email"
                class="o-nhap"
                placeholder="example@gmail.com"
              >
              <svg class="icon-tick" id="icon-tick-email" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20,6 9,17 4,12"/>
              </svg>
            </div>
            <div class="loi-text" id="loi-email"></div>
          </div>

          <div class="nhom-input">
            <label class="nhan" for="mat-khau">Mật khẩu mặc định</label>
            <div class="khung-input" id="khung-mat-khau">
              <input
                type="password"
                id="mat-khau"
                class="o-nhap"
                placeholder="JoyEnglish@123"
              >
              <button class="nut-mat-khau" id="nut-toggle-mk" type="button" title="Ẩn/Hiện mật khẩu">
                <svg id="icon-mat" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <div class="loi-text" id="loi-mat-khau"></div>
          </div>

          <div class="nhom-input">
            <label class="nhan" for="chuc-vu">Chức vụ</label>
            <div class="khung-select" id="khung-chuc-vu">
              <select id="chuc-vu" class="o-select">
                <option value="">-- Chọn chức vụ --</option>
                <option value="giao-vien">Giáo viên</option>
                <option value="tro-giang">Trợ giảng</option>
                <option value="admin">Admin</option>
              </select>
              <svg class="icon-select" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="6,9 12,15 18,9"/>
              </svg>
            </div>
            <div class="loi-text" id="loi-chuc-vu"></div>
          </div>

          <div class="nhom-nut">
            <button class="nut-huy" id="nut-huy" type="button">Hủy</button>
            <button class="nut-luu" id="nut-luu" type="button">Lưu</button>
          </div>

        </div>
      </div>

    </div>

  </div>

  <script src="aut01.js"></script>
</body>
</html>
