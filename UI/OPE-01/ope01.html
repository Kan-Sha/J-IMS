            <div class="vung-form">
                <h1 class="form-tieu-de" id="form-tieu-de">Tạo lớp học</h1>

                <div class="form-noi-dung" id="vung-them-lop">
                    <div class="hang-input">
                        <div class="nhom-input" style="flex:1">
                            <label class="nhan" for="ten-lop">Tên lớp</label>
                            <div class="khung-input" id="khung-ten-lop">
                                <input type="text" id="ten-lop" class="o-nhap" placeholder="KID-1D" minlength="3"
                                    maxlength="10">
                            </div>
                            <div class="loi-text" id="loi-ten-lop"></div>
                        </div>
                        <div class="nhom-input" style="flex:1">
                            <label class="nhan" for="cap-do">Cấp độ</label>
                            <div class="khung-select" id="khung-cap-do">
                                <span class="select-hien-thi" id="hien-thi-cap-do">-- Chọn cấp độ --</span>
                                <select id="cap-do" class="o-select">
                                    <option value="">-- Chọn cấp độ --</option>
                                </select>
                                <svg class="icon-select" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5">
                                    <polyline points="6,9 12,15 18,9" />
                                </svg>
                            </div>
                            <div class="loi-text" id="loi-cap-do"></div>
                        </div>
                    </div>

                    <div class="hang-input" style="margin-top:20px">
                        <div class="nhom-input" style="flex:1">
                            <label class="nhan" for="giao-vien">Giáo viên phụ trách</label>
                            <div class="khung-select" id="khung-giao-vien">
                                <span class="select-hien-thi" id="hien-thi-giao-vien">-- Chọn giáo viên --</span>
                                <select id="giao-vien" class="o-select">
                                    <option value="">-- Chọn giáo viên --</option>
                                </select>
                                <svg class="icon-select" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5">
                                    <polyline points="6,9 12,15 18,9" />
                                </svg>
                            </div>
                            <div class="loi-text" id="loi-giao-vien"></div>
                        </div>
                        <div class="nhom-input" style="flex:1">
                            <label class="nhan" for="hoc-phi">Học phí (/buổi)</label>
                            <div class="khung-input khung-readonly" id="khung-hoc-phi">
                                <input type="text" id="hoc-phi" class="o-nhap" placeholder="130,000 VND" readonly>
                            </div>
                        </div>
                    </div>

                    <div class="hang-input" style="margin-top:20px">
                        <div class="nhom-input" style="flex:1">
                            <label class="nhan" for="ngay-khai-giang">Ngày khai giảng</label>
                            <div class="khung-input" id="khung-ngay-khai-giang">
                                <input type="text" id="ngay-khai-giang" class="o-nhap" placeholder="DD/MM/YYYY">
                            </div>
                            <div class="loi-text" id="loi-ngay-khai-giang"></div>
                        </div>
                        <div class="nhom-input" style="flex:1">
                            <label class="nhan" for="so-luong-hs">Số lượng học sinh tối đa</label>
                            <div class="khung-input khung-readonly" id="khung-so-luong-hs">
                                <input type="number" id="so-luong-hs" class="o-nhap" placeholder="15" readonly>
                            </div>
                            <div class="loi-text" id="loi-so-luong-hs"></div>
                        </div>
                    </div>


                    <div class="nhom-input" style="margin-top:20px">
                        <label class="nhan">Lịch học trong tuần</label>
                        <div class="lich-hoc-tuan">
                            <label class="ngay-checkbox" id="cb-thu2">
                                <span class="ten-ngay">Thứ 2</span>
                                <input type="checkbox" value="Monday" class="checkbox-ngay">
                                <span class="hop-check"></span>
                            </label>
                            <label class="ngay-checkbox" id="cb-thu3">
                                <span class="ten-ngay">Thứ 3</span>
                                <input type="checkbox" value="Tuesday" class="checkbox-ngay">
                                <span class="hop-check"></span>
                            </label>
                            <label class="ngay-checkbox" id="cb-thu4">
                                <span class="ten-ngay">Thứ 4</span>
                                <input type="checkbox" value="Wednesday" class="checkbox-ngay">
                                <span class="hop-check"></span>
                            </label>
                            <label class="ngay-checkbox" id="cb-thu5">
                                <span class="ten-ngay">Thứ 5</span>
                                <input type="checkbox" value="Thursday" class="checkbox-ngay">
                                <span class="hop-check"></span>
                            </label>
                            <label class="ngay-checkbox" id="cb-thu6">
                                <span class="ten-ngay">Thứ 6</span>
                                <input type="checkbox" value="Friday" class="checkbox-ngay">
                                <span class="hop-check"></span>
                            </label>
                            <label class="ngay-checkbox" id="cb-thu7">
                                <span class="ten-ngay">Thứ 7</span>
                                <input type="checkbox" value="Saturday" class="checkbox-ngay">
                                <span class="hop-check"></span>
                            </label>
                        </div>
                        <div class="loi-text" id="loi-lich-hoc"></div>
                    </div>

                    <div class="nhom-input" style="margin-top:20px">
                        <label class="nhan">Khung giờ học</label>
                        <div class="khung-gio-hoc">
                            <div class="khung-input" id="khung-gio-bat-dau" style="flex:1">
                                <input type="text" id="gio-bat-dau" class="o-nhap" placeholder="5:50 PM">
                            </div>
                            <span class="den-text">đến</span>
                            <div class="khung-input" id="khung-gio-ket-thuc" style="flex:1">
                                <input type="text" id="gio-ket-thuc" class="o-nhap" placeholder="7:20 PM">
                            </div>
                        </div>
                        <div class="loi-text" id="loi-gio-hoc"></div>
                    </div>


                    <div class="nhom-nut">
                        <button class="nut-huy" id="nut-huy" type="button">Hủy</button>
                        <button class="nut-luu" id="nut-luu" type="button">Lưu</button>
                    </div>
                </div>

                <div class="overlay" id="overlay"></div>
                <div class="popup" id="popup">
                    <div class="popup-header">
                        <img src="/UI/assets/joyenglishlogo.jpg" alt="Logo" class="popup-logo">
                        <span class="popup-ten-app">J-IMS</span>
                    </div>
                    <p class="popup-noi-dung" id="popup-noi-dung">Lớp học đã được lưu thành công!</p>
                    <div class="popup-nut">
                        <button class="nut-luu" id="popup-nut-dong" type="button">Đóng</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div class="overlay" id="overlay-dang-xuat"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:101;"></div>
    <div id="popup-dang-xuat"
        style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; border:1px solid #8e8edf; border-radius:12px; z-index:102; min-width:420px; max-width:520px; box-shadow:0 8px 40px rgba(0,0,0,0.2); overflow:hidden;">
        <div class="popup-header">
            <img src="/UI/assets/joyenglishlogo.jpg" alt="Logo" class="popup-logo">
            <span class="popup-ten-app">J-IMS</span>
        </div>
        <div style="padding:24px 28px 28px; border-bottom:1px solid #8e8edf;">
            <p style="font-size:20px; font-weight:700; color:#000; margin-bottom:10px;">Đăng xuất</p>
            <p style="font-size:14px; color:#000;">Bạn có chắc chắn muốn đăng xuất khỏi hệ thống J-IMS không ?</p>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:12px; padding:16px 24px;">
            <button id="popup-dx-xac-nhan"
                style="width:140px;height:48px;background:transparent;color:#003366;border:1.5px solid #003366;border-radius:5px;font-family:'Be Vietnam Pro',sans-serif;font-size:15px;font-weight:600;cursor:pointer;">Đăng
                xuất</button>
            <button id="popup-dx-huy"
                style="width:140px;height:48px;background:#003366;color:#fff;border:none;border-radius:5px;font-family:'Be Vietnam Pro',sans-serif;font-size:15px;font-weight:700;cursor:pointer;">Hủy</button>
        </div>
    </div>
    <script src="../js/jims-shell.js"></script>
