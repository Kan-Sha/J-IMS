<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J-IMS - Đăng nhập</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

  <link rel="stylesheet" href="aut02.css">
</head>

<body>

  <div class="container-login">

    <div class="col-trai">
        <div class="logo-khu-vuc">
      <img src="../assets/joyenglishlogo.jpg" alt="J-IMS Logo" class="logo-anh">
      <div class="logo-phai">
    <div class="logo-ten">J-IMS</div>
    <div class="logo-mo-ta">Joy Integrated Management System</div>
  </div>
      </div>
      <div class="hinh-minh-hoa">
        <img src="illustrationlogo.jpg" alt="Minh họa làm việc nhóm">
      </div>

    </div>
    
    <div class="col-phai">

      <h1 class="tieu-de">Đăng nhập</h1>
      <p class="chao-mung">
        Chào mừng trở lại!<br>
        Vui lòng nhập thông tin của bạn.
      </p>
      <div class="thong-bao" id="thong-bao"></div>

      <div>

        <div class="nhom-input">
          <label class="nhan" for="email">Email</label>
          <div class="khung-input" id="khung-email">
            <svg class="icon-input" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="3"/>
              <polyline points="2,4 12,13 22,4"/>
            </svg>
            <input
              type="email"
              id="email"
              class="o-nhap"
              placeholder="example@gmail.com"
              autocomplete="email"
            >
          </div>
          <div class="loi-text" id="loi-email"></div>
        </div>

        <div class="nhom-input">
          <label class="nhan" for="mat-khau">Mật khẩu</label>
          <div class="khung-input" id="khung-matkhau">
            <svg class="icon-input" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              type="password"
              id="mat-khau"
              class="o-nhap"
              placeholder="**********"
              autocomplete="current-password"
            >
            <button
              class="nut-mat-khau"
              id="nut-toggle-mk"
              type="button"
              title="Ẩn/Hiện mật khẩu"
            >
              <svg id="icon-mat" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <div class="loi-text" id="loi-matkhau"></div>
        </div>


        <button
          class="nut-dang-nhap"
          id="nut-dang-nhap"
        >
          Đăng nhập
        </button>

      </div>

    </div>

  </div>

  <script src="aut02.js"></script>
</body>
</html>
