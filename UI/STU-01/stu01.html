    <div class="vung-form">
      <h1 class="form-tieu-de">Thêm học sinh mới</h1>

      <div class="form-noi-dung">
        <div class="hang-input">
          <div class="nhom-input" style="flex:1.1">
            <label class="nhan" for="ho">Họ</label>
            <div class="khung-input" id="khung-ho">
              <input type="text" id="ho" class="o-nhap" placeholder="Nguyễn">
            </div>
            <div class="loi-text" id="loi-ho"></div>
          </div>
          <div class="nhom-input" style="flex:1.5">
            <label class="nhan" for="ten">Tên</label>
            <div class="khung-input" id="khung-ten">
              <input type="text" id="ten" class="o-nhap" placeholder="Văn A">
            </div>
            <div class="loi-text" id="loi-ten"></div>
          </div>
          <div class="nhom-input" style="flex:1.5">
            <label class="nhan" for="ngay-sinh">Ngày sinh</label>
            <div class="khung-input" id="khung-ngay-sinh">
              <input type="text" id="ngay-sinh" class="o-nhap" placeholder="DD/MM/YYYY">
            </div>
            <div class="loi-text" id="loi-ngay-sinh"></div>
          </div>
          <div class="nhom-input" style="flex:0.9">
            <label class="nhan" for="gioi-tinh">Giới tính</label>
            <div class="khung-select" id="khung-gioi-tinh">
              <select id="gioi-tinh" class="o-select">
                <option value="nam">Nam</option>
                <option value="nu">Nữ</option>
              </select>
              <svg class="icon-select" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="6,9 12,15 18,9"/>
              </svg>
            </div>
            <div class="loi-text"></div>
          </div>
        </div>
        <div class="hang-input" style="margin-top:16px">
          <div class="nhom-input" style="flex:2.5">
            <label class="nhan" for="ho-ten-ph">Họ tên phụ huynh</label>
            <div class="khung-input" id="khung-ho-ten-ph">
              <input type="text" id="ho-ten-ph" class="o-nhap" placeholder="Nguyễn Văn B">
            </div>
            <div class="loi-text" id="loi-ho-ten-ph"></div>
          </div>
          <div class="nhom-input" style="flex:1.5">
            <label class="nhan" for="ma-hv">Mã học sinh</label>
            <div class="khung-input ma-hv-khung" id="khung-ma-hv">
              <input type="text" id="ma-hv" class="o-nhap" placeholder="JS-202603-001" readonly>
            </div>
            <div class="loi-text"></div>
          </div>
        </div>

        <div class="nhom-input" style="margin-top:16px">
          <label class="nhan" for="email">Email</label>
          <div class="khung-input" id="khung-email">
            <input type="email" id="email" class="o-nhap" placeholder="example@gmail.com">
            <span class="icon-trang-thai" id="icon-email"></span>
          </div>
          <div class="loi-text" id="loi-email"></div>
        </div>

        <div class="nhom-input" style="margin-top:16px">
          <label class="nhan" for="sdt">Số điện thoại liên hệ</label>
          <div class="khung-input" id="khung-sdt">
            <input type="text" id="sdt" class="o-nhap" placeholder="0123456789">
            <span class="icon-trang-thai" id="icon-sdt"></span>
          </div>
          <div class="loi-text" id="loi-sdt"></div>
        </div>

        <div class="nhom-input" style="margin-top:16px">
          <label class="nhan" for="dia-chi">Địa chỉ</label>
          <div class="khung-input" id="khung-dia-chi">
            <input type="text" id="dia-chi" class="o-nhap" placeholder="123 Nguyen Trai, Ha Noi">
          </div>
          <div class="loi-text" id="loi-dia-chi"></div>
        </div>

        <div class="nhom-nut">
          <button class="nut-huy" id="nut-huy" type="button">Hủy</button>
          <button class="nut-luu" id="nut-luu" type="button">Lưu</button>
        </div>

      </div>
        <div class="overlay" id="overlay"></div>
        <div class="popup" id="popup">
          <div class="popup-header">
            <img src="/assets/joyenglishlogo.jpg" alt="Logo" class="popup-logo">
            <span class="popup-ten-app">J-IMS</span>
          </div>
          <p class="popup-noi-dung" id="popup-noi-dung">Học sinh đã tồn tại!</p>
          <div class="popup-nut">
            <button class="nut-luu" id="popup-nut-huy" type="button">Hủy</button>
        </div>
      </div>
    </div>
  </div>
</div>

    <span class="popup-ten-app">J-IMS</span>
  </div>
  <div style="padding:24px 28px 28px; border-bottom:1px solid #8e8edf;">
    <p style="font-size:20px; font-weight:700; color:#000; margin-bottom:10px;">Đăng xuất</p>
    <p style="font-size:14px; color:#000;">Bạn có chắc chắn muốn đăng xuất khỏi hệ thống J-IMS không ?</p>
  </div>
  <div style="display:flex; justify-content:flex-end; gap:12px; padding:16px 24px;">
    <button id="popup-dx-xac-nhan" style="width:140px;height:48px;background:transparent;color:#003366;border:1.5px solid #003366;border-radius:5px;font-family:'Be Vietnam Pro',sans-serif;font-size:15px;font-weight:600;cursor:pointer;">Đăng xuất</button>
    <button id="popup-dx-huy" style="width:140px;height:48px;background:#003366;color:#fff;border:none;border-radius:5px;font-family:'Be Vietnam Pro',sans-serif;font-size:15px;font-weight:700;cursor:pointer;">Hủy</button>
  </div>
</div>
