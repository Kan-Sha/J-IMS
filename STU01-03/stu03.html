    <div class="vung-form">
      <h1 class="form-tieu-de">Danh sách học sinh</h1>
      <div class="bo-loc">
        <div class="bo-loc-hang">
          <div class="bo-loc-nhom bo-loc-tim-kiem">
            <label class="nhan" for="tim-kiem">Tìm theo tên hoặc mã học sinh</label>
            <div class="khung-input" id="khung-tim-kiem">
              <input type="text" id="tim-kiem" class="o-nhap" placeholder="Nhập tên hoặc mã học sinh">
            </div>
          </div>
          <div class="bo-loc-nhom bo-loc-lop">
            <label class="nhan" for="loc-lop">Lớp</label>
            <div class="khung-select" id="khung-loc-lop">
              <select id="loc-lop" class="o-select">
                <option value="">Chọn lớp</option>
                <option value="6A">6A</option>
                <option value="6B">6B</option>
                <option value="6C">6C</option>
                <option value="7A">7A</option>
                <option value="7B">7B</option>
                <option value="8A">8A</option>
                <option value="8B">8B</option>
              </select>
              <span class="select-hien-thi" id="hien-thi-lop">Chọn lớp</span>
              <svg class="icon-select" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="6,9 12,15 18,9"/>
              </svg>
            </div>
          </div>
          <div class="bo-loc-nhom bo-loc-trang-thai">
            <label class="nhan" for="loc-trang-thai">Trạng thái học tập</label>
            <div class="khung-select" id="khung-loc-trang-thai">
              <select id="loc-trang-thai" class="o-select">
                <option value="">Chọn trạng thái</option>
                <option value="dang-hoc">Đang học</option>
                <option value="nghi-hoc">Nghỉ học</option>
              </select>
              <span class="select-hien-thi" id="hien-thi-trang-thai">Chọn trạng thái</span>
              <svg class="icon-select" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="6,9 12,15 18,9"/>
              </svg>
            </div>
          </div>
        </div>
        <div class="bo-loc-nut">
          <button class="nut-luu" id="nut-tim-kiem" type="button">Tìm kiếm</button>
          <button class="nut-huy" id="nut-dat-lai" type="button">Đặt lại</button>
        </div>
      </div>
      <div class="bang-container">
        <table class="bang-hoc-sinh">
          <thead>
            <tr>
              <th>Mã học sinh</th>
              <th>Họ và tên</th>
              <th>Ngày sinh</th>
              <th>Giới tính</th>
              <th>Lớp</th>
              <th>Trạng thái học tập</th>
            </tr>
          </thead>
          <tbody id="bang-than">
          </tbody>
        </table>
      </div>
    </div>

  <div class="popup-header">

  </div>
